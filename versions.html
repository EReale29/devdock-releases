<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevDock — Versions</title>
    <meta name="description" content="Toutes les versions de DevDock : notes de version et téléchargements pour macOS, Windows et Linux." />
    <link rel="icon" type="image/png" href="logo.png" />
    <style>
      :root {
        --bg: #070a12; --card: rgba(22, 27, 38, 0.7); --fg: #eef2f8; --muted: #93a0b4;
        --primary: #3b82f6; --sky: #38bdf8; --border: rgba(255, 255, 255, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; color: var(--fg); background: var(--bg); overflow-x: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
      }
      .bg {
        position: fixed; inset: 0; z-index: -1;
        background:
          radial-gradient(900px 500px at 15% -5%, rgba(56,189,248,0.18), transparent 60%),
          radial-gradient(900px 600px at 85% 0%, rgba(59,130,246,0.16), transparent 55%), var(--bg);
      }
      .container { max-width: 820px; margin: 0 auto; padding: 0 22px; }

      header { text-align: center; padding: 54px 0 26px; }
      .top { display: flex; align-items: center; justify-content: center; gap: 14px; }
      .logo { width: 56px; height: 56px; border-radius: 14px; filter: drop-shadow(0 10px 24px rgba(13,138,208,0.4)); }
      h1 {
        font-size: clamp(2rem, 5vw, 2.8rem); margin: 0; font-weight: 800; letter-spacing: -0.02em;
        background: linear-gradient(90deg, #7dd3fc, #3b82f6 60%, #2563eb);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .sub { color: var(--muted); margin: 12px 0 0; }
      .nav { text-align: center; margin: 6px 0 30px; }
      .nav a { color: var(--sky); text-decoration: none; font-size: 0.92rem; }

      .release {
        background: var(--card); border: 1px solid var(--border); border-radius: 18px;
        padding: 22px 24px; margin-bottom: 18px; backdrop-filter: blur(14px);
      }
      .rhead { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 4px; }
      .rhead h2 { margin: 0; font-size: 1.5rem; }
      .badge {
        font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
        padding: 3px 9px; border-radius: 999px; background: rgba(16,185,129,0.15); color: #34d399;
      }
      .date { color: var(--muted); font-size: 0.85rem; }
      .notes {
        white-space: pre-wrap; color: #cdd6e3; font-size: 0.92rem; line-height: 1.6;
        margin: 14px 0; padding: 14px; border-radius: 10px; background: rgba(0,0,0,0.25);
        border: 1px solid var(--border); max-height: 280px; overflow: auto;
      }
      .dl { display: flex; flex-wrap: wrap; gap: 8px; }
      .dl a {
        display: inline-flex; align-items: center; gap: 7px; text-decoration: none;
        font-size: 0.86rem; color: var(--fg); padding: 9px 13px; border-radius: 10px;
        border: 1px solid var(--border); background: rgba(15,18,24,0.6); transition: border-color 0.15s;
      }
      .dl a:hover { border-color: var(--primary); }
      .dl a small { color: var(--muted); }
      .empty, .err { text-align: center; color: var(--muted); padding: 40px 0; }
      .err { color: #f87171; }
      footer { text-align: center; color: var(--muted); font-size: 0.82rem; padding: 30px 0 50px; }
      footer a { color: var(--sky); text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <header class="container">
      <div class="top">
        <img class="logo" src="logo.png" alt="DevDock" />
        <h1>Versions</h1>
      </div>
      <p class="sub">Historique complet et téléchargements de DevDock.</p>
    </header>
    <div class="nav container"><a href="index.html">← Retour au téléchargement</a></div>

    <main class="container" id="list">
      <p class="empty">Chargement des versions…</p>
    </main>

    <footer class="container">
      <a href="https://github.com/EReale29/devdock-releases/releases" target="_blank" rel="noopener">Voir sur GitHub</a>
    </footer>

    <script>
      const REPO = "EReale29/devdock-releases";

      function categorize(assets) {
        const out = [];
        const add = (re, label, tag) => {
          const a = assets.find((x) => re.test(x.name));
          if (a) out.push({ tag, label, url: a.browser_download_url });
        };
        add(/\.dmg$/i, "macOS", ".dmg");
        add(/-setup\.exe$/i, "Windows", ".exe");
        add(/\.msi$/i, "Windows", ".msi");
        add(/\.AppImage$/i, "Linux", ".AppImage");
        add(/\.deb$/i, "Linux", ".deb");
        add(/\.rpm$/i, "Linux", ".rpm");
        return out;
      }
      function esc(s) {
        return (s || "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      }
      function fmtDate(iso) {
        try { return new Date(iso).toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" }); }
        catch { return ""; }
      }

      async function init() {
        const list = document.getElementById("list");
        try {
          const res = await fetch(`https://api.github.com/repos/${REPO}/releases?per_page=100`, {
            headers: { Accept: "application/vnd.github+json" },
          });
          if (!res.ok) throw new Error("api");
          const releases = (await res.json()).filter((r) => !r.draft);
          if (releases.length === 0) { list.innerHTML = '<p class="empty">Aucune version publiée.</p>'; return; }

          list.innerHTML = "";
          releases.forEach((r, i) => {
            const assets = (r.assets || []).filter((a) => !/\.sig$/i.test(a.name) && a.name !== "latest.json");
            const dls = categorize(assets)
              .map((d) => `<a href="${d.url}" rel="noopener">${d.label} <small>${d.tag}</small></a>`)
              .join("");
            const el = document.createElement("article");
            el.className = "release";
            el.innerHTML =
              `<div class="rhead">
                 <h2>${esc(r.tag_name || r.name || "")}</h2>
                 ${i === 0 ? '<span class="badge">Dernière</span>' : ""}
                 <span class="date">${fmtDate(r.published_at)}</span>
               </div>
               ${r.body ? `<div class="notes">${esc(r.body)}</div>` : ""}
               <div class="dl">${dls || '<span class="date">Aucun installateur.</span>'}</div>`;
            list.appendChild(el);
          });
        } catch (e) {
          list.innerHTML = `<p class="err">Impossible de charger les versions. <a href="https://github.com/${REPO}/releases">Voir sur GitHub</a>.</p>`;
        }
      }
      init();
    </script>
  </body>
</html>
